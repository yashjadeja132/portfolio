# Render Blueprint — deploys the whole app as ONE Node web service:
# Express (client/api/index.js) serves the built React SPA (client/dist) + the API.
# Import this repo at https://render.com → "New +" → "Blueprint".
services:
  - type: web
    name: yashrajsinh-portfolio
    runtime: node
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      # Set these values in the Render dashboard (sync:false keeps them out of git).
      - key: SITE_URL
        sync: false
      - key: VITE_SITE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CONTACT_FROM
        sync: false
